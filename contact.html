<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Murray Abeles</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="site-name">Murray Abeles</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="bio.html">Bio</a>
                <a href="press.html">Press</a>
                <a href="contact.html" class="active">Contact</a>
                <a href="https://www.linkedin.com/in/murrayabeles/" target="_blank">LinkedIn</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="contact-wrap">
            <div class="contact-intro">
                <h1>Contact</h1>
                <p>Send a message and I'll get back to you.</p>
            </div>
            <div class="contact-card">
                <form name="contact" method="post" data-netlify="true">
                    <input type="hidden" name="form-name" value="contact">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Murray Abeles</p>
    </footer>
</body>
</html>
